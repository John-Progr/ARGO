services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./memory:/app/memory

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        AGENT_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
